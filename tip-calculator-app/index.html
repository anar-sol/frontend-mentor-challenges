<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Tip calculator app</title>

  <script src="TipCalculator.js"></script>
  <script defer src="main.js"></script>
</head>

<body>

  <main>
    <div class="wrapper">
      <header class="header">
        <div class="header__container">
          <h1 class="main-title">Spli<br>tter</h1>
        </div>
      </header>

      <article class="tip">
        <div class="tip__container">
          <div class="tip__inputs">
            <div class="text-field">
              <label for="tip-bill" class="text-field__label">
                <h2 class="tip__input-heading">Bill</h2>
              </label>
              <input type="number" value="0" id="tip-bill" class="text-field__input">
            </div>

            <div class="control-group">
              <h2 class="tip__input-heading">Select Tip %</h2>
              <button id="tip-btn-5" class="btn">5%</button>
              <button id="tip-btn-10" class="btn">10%</button>
              <button id="tip-btn-15" class="btn btn--highlighted">15%</button>
              <button id="tip-btn-25" class="btn">25%</button>
              <button id="tip-btn-50" class="btn">50%</button>
              <div class="text-field control-group__text-field">
                <input type="number" value="0" id="tip-tip" class="text-field__input">
                <label for="tip-tip" class="text-field__label text-field__label--contained">Custom tip %</label>
            </div>

            <div class="text-field">
              <label for="tip-people" class="text-field__label">
                <h2 class="tip__input-heading">Number of People</h2>
              </label>
              <input type="number" value="1" id="tip-people" class="text-field__input">
            </div>
          </div>

          <div class="tip__outputs">
            <div class="tip__output-field">
              <label for="tip-amount" class="tip__output-label">
                <h2 class="tip__output-heading">Tip Amount <span>/ person</span></h2>
              </label>
              <output id="tip-amount" for="bill people custom-tip">$0</output>
            </div>

            <div class="tip__output-field">
              <label for="tip-total" class="tip__output-label">
                <h2 class="tip__output-heading">Total <span>/ person</span></h2>
              </label>
              <output id="tip-total" for="bill people custom-tip">$0</output>
            </div>

            <button type="button" id="tip-reset" class="btn btn--highlighted">Reset</button>
          </div>
        </div>
      </article>
    </div>
  </main>
</body>

</html>
