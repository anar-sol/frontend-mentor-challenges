<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style/style.css">
  
  <title>Frontend Mentor | NFT preview card component</title>
</head>
<body>
  <main class="wrapper">
    <div class="card">
      <div class="card__container">
        <div class="card__media">
          <a href="#" class="card__media-link">
            <img class="card__media-img" src="images/image-equilibrium.jpg" alt="Equilibrium #3429">
          </a>
        </div>
        <div class="card__body">
          <h2 class="card__title"><a href="#" class="card__title-link">Equilibrium #3429</a></h2>
          <p class="card__description">Our Equilibrium collection promotes balance and calm.</p>
          <div class="card__meta">
            <div class="card__price">0.041 ETH</div>
            <div class="card__time">3 days left</div>
          </div>
          <div class="card__author">
            <img src="images/image-avatar.png" alt="Jules Wyvern" class="card__author-avatar">
            <div class="card__author-name">Creation of <a href="#" class="card__author-link">Jules Wyvern</a></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
