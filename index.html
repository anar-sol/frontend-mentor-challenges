<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Base Apparel coming soon page</title>
</head>
<body>
  <main class="container">
    <article class="coming-soon">
      <header class="coming-soon__header">
        <img class="coming-soon__logo logo" src="images/logo.svg" alt="Base Apparel">
      </header>

      <div class="coming-soon__image"></div>

      <div class="coming-soon__content content">
        <h1 class="content__title">We're<br> coming<br> soon</h1>

        <p class="content__text">  Hello fellow shoppers! We're currently building our new fashion store. Add your email below to stay up-to-date with announcements and our launch deals.</p>

        <form action="#" method="POST" class="content_form form">
          <label class="form__label" for="email">Email Address</label>
          <input class="form__field" type="email" name="email" id="email">
          <button class="form__button" type="submit" aria-label="submit"></button>
        </form>
      </div>
    </article>
  </main>
</body>
</html>
