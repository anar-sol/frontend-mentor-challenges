<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Intro component with sign up form</title>
</head>

<body>
  <main>
    <div class="section">
      <div class="container">
        <div class="content">
          <h1 class="content__title">Learn to code by watching others</h1>
          <p class="content__text">See how experienced developers solve problems in real-time. Watching scripted
            tutorials is great,
            but understanding how developers think is invaluable.</p>
        </div>

        <div class="form-container">

          <div class="banner">
            <p class="banner__text"><span class="banner__highlighted">Try it free 7 days</span> then $20/mo.
              thereafter</p>
          </div>

          <form action="" class="form" novalidate>
            <div class="text-field">
              <input type="text" required placeholder="First Name" name="first-name" id="first-name"
                class="text-field__input">
              <p class="text-field__error"></p>
            </div>

            <div class="text-field">
              <input type="text" required placeholder="Last Name" name="last-name" id="last-name"
                class="text-field__input">
              <p class="text-field__error"></p>
            </div>

            <div class="text-field">
              <input type="email" required placeholder="Email Address" name="email" id="email"
                class="text-field__input">
              <p class="text-field__error"></p>
            </div>

            <div class="text-field">
              <input type="text" required placeholder="Password" name="password" id="password"
                class="text-field__input">
              <p class="text-field__error"></p>
            </div>

            <button type="submit" class="button">Claim your free trial</button>

            <p class="help">By clicking the button, you are agreeing to our <a class="help__link" href="#">Terms and
                Services</a></p>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    const textFields = document.querySelectorAll('.text-field');

    new TextField(textFields.item(0), { [TextField.VALUE_MISSING]: "First Name cannot be empty" });
    new TextField(textFields.item(1), { [TextField.VALUE_MISSING]: "Last Name cannot be empty" });
    new TextField(textFields.item(2), { [TextField.VALUE_MISSING]: "Email cannot be empty", [TextField.TYPE_MISMATCH]: "Looks like this is not an email" });
    new TextField(textFields.item(3), { [TextField.VALUE_MISSING]: "Password cannot be empty" });
    TextField.activateFormValidation(document.querySelector('.form'))
  </script>
</body>

</html>
