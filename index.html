<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Stats preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <!--
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  -->
</head>
<body>

  <div class="container">
    <article class="card">
      <div class="card__img"></div>
      <div class="card__body">
        <h1 class="card__title">Get <span class="highlighted">insights</span> that help your business grow.</h1>
        <p class="card__text">Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.</p>
        <ul class="stats">
          <li class="stats__item"><div class="stats__value">10k+</div><h2 class="stats__title">companies</h2></li>
          <li class="stats__item"><div class="stats__value">314</div><h2 class="stats__title">templates</h2></li>
          <li class="stats__item"><div class="stats__value">12M+</div><h2 class="stats__title">queries</h2></li>
        </ul>
      </div>
    </article>
  </div>
  <!--
  <div class="attribution">

    Coded by <a href="#">Your Name Here</a>.
  </div>
  -->
</body>
</html>
