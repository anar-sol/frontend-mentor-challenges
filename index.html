<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>
</head>
<body>
  <header class="header">
    <img src="images/logo.svg" alt="Huddle" class="header__logo">
  </header>

  <main class="main-content">
    <article class="hero">
      <div class="hero__image"></div>
      <div class="hero__content">
        <h1 class="hero__title">Build The Community Your Fans Will Love</h1>
        <p class="hero__text">Huddle re-imagines the way we build communities. You have a voice, but so does your audience. Create connections with your users as you engage in genuine discussion. </p>
        <a href="#" class="hero__cta">Register</a>
      </div>
    </article>
  </main>

  <footer class="footer">
    <ul class="footer__social-links social-links">
      <li class="social-links__item"><a href="#" class="social-links__link">
        <svg class="social-links__icon">
          <use href="images/icons.svg#icon-facebook"/>
        </svg>
      </a></li>
      <li class="social-links__item"><a href="#" class="social-links__link">
        <svg class="social-links__icon">
          <use href="images/icons.svg#icon-twitter"/>
        </svg>
      </a></li>
      <li class="social-links__item"><a href="#" class="social-links__link">
        <svg class="social-links__icon">
          <use href="images/icons.svg#icon-instagram"/>
        </svg>
      </a></li>
    </ul>
  </footer>
</body>
</html>
