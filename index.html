<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Profile card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <!--
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  -->
</head>
<body>
  <main>
    <div class="container">
      <article class="profile-card">
        <div class="profile-card__bg"></div>
        <div class="profile-card__picture-container">
          <img src="image-victor.jpg" alt="Victor Crest profile picture" class="profile-card__picture">
        </div>
        <div class="profile-card__body">
          <div class="profil-card__info">
            <h2 class="profile-card__name">Victor Crest</h2>
            <div class="profile-card__age">26</div>
            <div class="profile-card__location">London</div>
          </div>
          <ul class="profile-card__stats stats">
            <li class="stats__item">
              <div class="stats__value">80K</div>
              <h3 class="stats__title">Followers</h3>
            </li>
            <li class="stats__item">
              <div class="stats__value">803K</div>
              <h3 class="stats__title">Likes</h3>
            </li>
            <li class="stats__item">
              <div class="stats__value">1.4K</div>
              <h3 class="stats__title">Photos</h3>
            </li>
          </ul>
        </div>
      </article>
    </div>
  </main>
  <!--
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
  -->
</body>
</html>
