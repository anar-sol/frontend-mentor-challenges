<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Time tracking dashboard</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="wrapper">
    <article class="dashboard">
      <header class="dashboard__header">
        <div class="dashboard__user">
          <div class="dashboard__user-picture">
            <img src="images/image-jeremy.png" alt="Jeremy's picture">
            <h1 class="dashboard__title">
              <div class="dashboard__title-sup">Report for</div>
              <div class="dahsboard__title-name">Jeremy Robson</div>
            </h1>
          </div>
        </div>
        <div class="dashboard__controls">
          <button type="button" class="dashboard__control-btn">Daily</button>
          <button type="button" class="dashboard__control-btn">Weekly</button>
          <button type="button" class="dashboard__control-btn">Monthly</button>
        </div>
      </header>

      <div class="dashboard__card">
        <div class="dashboard__card-header">
          <h2 class="dashboard__card-title"></h2>
          <button class="dashboard__card-options-btn"></button>
        </div>
        <div class="dashboard__card-body">
          <div class="dashboard__card-value"></div>
          <div class="dashboard__card-last-value"></div>
        </div>
      </div>
    </article>
  </div>
</body>
</html>
