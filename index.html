<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Order summary card</title>
</head>

<body>
  <div class="wrapper">
    <div class="order-summary">
      <div class="order-summary__body">
        <h1 class="order-summary__title">Order Summary</h1>
        <p class="order-summary__text">You can now listen to millions of songs, audiobooks, and podcasts on any device
          anywhere you like!</p>
        <div class="order-summary__item">
          <div class="order-summary__item-body">
            <h2 class="order-summary__item-title">Annual Plan</h2>
            <p class="order-summary__item-price">$59.99/year</p>
          </div>
          <a href="#" class="order-summary__item-link">Change</a>
        </div>
        <a href="#" class="order-summary__btn order-summary__btn--primary">Proceed to Payment</a>
        <a href="#" class="order-summary__btn order-summary__btn--secondary">Cancel Order</a>
      </div>
    </div>
  </div>
</body>

</html>
